apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: watchlist
spec:
  type: NodePort
  selector:
    app: frontend          # routes to pods with label app=frontend
  ports:
    - port: 80             # cluster internal port
      targetPort: 80       # nginx inside container
      nodePort: 30080      # external port on every worker node public IP
