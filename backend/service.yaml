apiVersion: v1
kind: Service
metadata:
  name: watchlist-backend    # must match what nginx.conf proxies to
  namespace: watchlist
spec:
  type: ClusterIP            # only reachable inside cluster, not from internet
  selector:
    app: backend             # routes traffic to pods with label app=backend
  ports:
    - port: 5000             # port other pods use to reach backend
      targetPort: 5000       # port inside the backend container
